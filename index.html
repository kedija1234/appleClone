<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple Clone</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="navbar navbar-expand-lg navbar-light fixed-top header-wrapper"></header>

    <!-- SECTION 1 - 16 inch MacBook Pro -->
    <section class="main-highlight-wrapper"></section>

    <!-- SECTION 2 - iPhone 11 Pro -->
    <section class="second-hightlight-wrapper"></section>

    <!-- SECTION 3 - iPhone 11 -->
    <section class="third-highlight-wrapper"></section>

    <!-- SECTION 4 - Watch & Card -->
    <section class="fourth-heghlight-wrapper">
      <div class="col-12 col-sm-12 col-m-6 col-lg-6 left-side-wrapper"></div>
      <div class="col-12 col-sm-12 col-m-6 col-lg-6 right-side-wrapper"></div>
    </section>

    <!-- SECTION 5 - tv+ & AirPods -->
    <section  class="fifth-heghlight-wrapper">
      <div class="col-sm-12 col-m-6 col-lg-6 left-side-wrapper"></div>
      <div class="col-sm-12 col-m-6 col-lg-6 right-side-wrapper"></div>
    </section>

    <!-- SECTION 6 - MacBook & iPad -->
    <section class="sixth-heghlight-wrapper">
      <div class="col-sm-12 col-m-6 col-lg-6 left-side-wrapper"></div>
      <div class="col-sm-12 col-m-6 col-lg-6 right-side-wrapper"></div>
    </section>

    <!-- FOOTER -->
    <footer class="footer-wrapper"></footer>
  </body>
</html>
