<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple Clone</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HEADER -->
    

<header>
      <section-1>
        <div class="header-links">
          <ul class="nav">
            <li class="icon">
              <a href="#">
                <img src="images/appleimages/icons/logo.png" alt="apple-logo" />
              </a>
            </li>
            <li><a href="#">mac</a></li>
            <li><a href="#">iphone</a></li>
            <li><a href="#">ipad</a></li>
            <li><a href="#">watch</a></li>
            <li><a href="#">tv</a></li>
            <li><a href="#">music</a></li>
            <li><a href="#">support</a></li>
            <li><a href="# "></a></li>
            <li class="icon">
              <a href="#">
                <img src="images/appleimages/icons/search-icon.png" alt="Search-logo" />
              </a>
            </li>
            <li class="icon">
              <a href="#">
                <img src="images/appleimages/icons/cart.png" alt="cart-logo" />
              </a>
            </li>
          </ul>
        </div>
      </section-1>
    </header>







    </header>

    <!-- SECTION 1 - 16 inch MacBook Pro -->
    <section id="section1">
      <div class="container">
        <div
          class="row h-100 align-items-center justify-content-center text-center"
        >
          <div class="col-12">
            <div class="model">16-inch model</div>

            <div class="product-title">MacBook Pro</div>

            <div class="brief-description">The best for the brightest.</div>

            <div class="links-wrapper">
              <ul>
                <li><a href="">Learn more</a></li>
                <li><a href="">Buy</a></li>
              </ul>
            </div>

            <div class="main-image-wrapper">
              <img src="images/home/mac-laptop.jpg" />
            </div>
          </div>
        </div>
      </div>
      



    </section>

    <!-- SECTION 2 - iPhone 11 Pro -->
    <section id="section2"></section>

    <!-- SECTION 3 - iPhone 11 -->
    <section id="section3"></section>

    <!-- SECTION 4 - Watch & Card -->
    <section id="section4">
      <div id="watch"></div>
      <div id="card"></div>
    </section>

    <!-- SECTION 5 - tv+ & AirPods -->
    <section id="section5">
      <div id="tvplus"></div>
      <div id="airpods"></div>
    </section>

    <!-- SECTION 6 - MacBook & iPad -->
    <section id="section6">
      <div id="macbook"></div>
      <div id="ipad"></div>
    </section>

    <!-- FOOTER -->
    <footer id="footer"></footer>
  </body>
</html>
