<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple Clone</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- HEADER -->
    

<header>
      <section-1>
        <div class="header-links">
          <ul class="nav">
            <li class="icon">
              <a href="#">
                <img src="images/appleimages/icons/logo.png" alt="apple-logo" />
              </a>
            </li>
            <li><a href="#">mac</a></li>
            <li><a href="#">iphone</a></li>
            <li><a href="#">ipad</a></li>
            <li><a href="#">watch</a></li>
            <li><a href="#">tv</a></li>
            <li><a href="#">music</a></li>
            <li><a href="#">support</a></li>
            <li><a href="# "></a></li>
            <li class="icon">
              <a href="#">
                <img src="images/appleimages/icons/search-icon.png" alt="Search-logo" />
              </a>
            </li>
            <li class="icon">
              <a href="#">
                <img src="images/appleimages/icons/cart.png" alt="cart-logo" />
              </a>
            </li>
          </ul>
        </div>
      </section-1>
    </header>







    </header>

    <!-- SECTION 1 - 16 inch MacBook Pro -->
    <section id="section1"></section>

    <!-- SECTION 2 - iPhone 11 Pro -->
    <section id="section2"></section>

    <!-- SECTION 3 - iPhone 11 -->
    <section id="section3"></section>

    <!-- SECTION 4 - Watch & Card -->
    <section id="section4">
      <div class="row">
        <div class="col-12 col-sm-12 col-m-6 col-lg-6 left-side-wrapper">
          <div class="left-side-inner-wrapper">
            <div class="top-logo-wrapper">
              <div class="logo-wrapper">
                <img src="images/icons/watch-series5-logo.png" />
              </div>
            </div>
            <div class="description-wraper">
              With the new Always-On Retina display.<br />
              You’ve never seen a watch like this.
            </div>
            <div class="links-wrapper">
              <ul>
                <li><a href="">Learn more</a></li>
                <li><a href="">Buy</a></li>
              </ul>
            </div>
          </div>
        </div>

        <div class="col-12 col-sm-12 col-m-6 col-lg-6 right-side-wrapper">
          <div class="right-side-inner-wrapper">
            <div class="top-logo-wrapper">
              <div class="logo-wrapper">
                <img src="images/icons/apple-card-logo.png" />
              </div>
            </div>
            <div class="description-wraper">
              Get 3% Daily Cash on purchases from Apple using Apple Card.
            </div>
            <div class="links-wrapper">
              <ul>
                <li><a href="">Learn more</a></li>
                <li><a href="">Buy</a></li>
              </ul>
            </div>
          </div>
        </div>
      </div>
      
    </section>

    <!-- SECTION 5 - tv+ & AirPods -->
    <section id="section5">
      <div id="tvplus"></div>
      <div id="airpods"></div>
    </section>

    <!-- SECTION 6 - MacBook & iPad -->
    <section id="section6">
      <div id="macbook"></div>
      <div id="ipad"></div>
    </section>

    <!-- FOOTER -->
    <footer id="footer"></footer>
  </body>
</html>
