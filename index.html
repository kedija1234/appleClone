  <link rel="stylesheet" href="css/bootstrap.css" />

<body>
  <!-- HEADER -->


  <header>
    <section-1>
      <div class="header-links">
        <ul class="nav">
          <li class="icon">
            <a href="#">
              <img src="images/icons/logo.png" alt="apple-logo" />
            </a>
          </li>
          <li><a href="#">mac</a></li>
          <li><a href="#">iphone</a></li>
          <li><a href="#">ipad</a></li>
          <li><a href="#">watch</a></li>
          <li><a href="#">tv</a></li>
          <li><a href="#">music</a></li>

          <li><a href="# "></a></li>
          <li class="icon">
            <a href="#">
              <img src="images/icons/search-icon.png" alt="Search-logo" />
            </a>
          </li>
          <li class="icon">
            <a href="#">
              <img src="images/icons/cart.png" alt="cart-logo" />

          </li>
        </ul>
      </div>
    </section-1>
  </header>







  </header>

  <!-- SECTION 1 - 16 inch MacBook Pro -->
  <section id="section1"></section>

  <!-- SECTION 2 - iPhone 11 Pro -->
  <section id="section2"></section>

      <div class="col-sm-12 col-m-6 col-lg-6 left-side-wrapper">
        <div class="left-side-inner-wrapper">

          </div>

          </div>
        </div>
      </div>

      <div class="col-sm-12 col-m-6 col-lg-6 right-side-wrapper">
        <div class="right-side-inner-wrapper">
          <div class="top-logo-wrapper">
            <div class="logo-wrapper">AirPods Pro</div>
          </div>

          <div class="description-wraper">Magic like you’ve never heard.</div>

          <div class="links-wrapper">
            <ul>
              <li><a href="">Learn more</a></li>
              <li><a href="">Buy</a></li>

          </div>
